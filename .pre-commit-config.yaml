# Pre-commit hooks, run with prek (https://github.com/j178/prek) or pre-commit.
# Install with: prek install
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write --cache --ignore-unknown
        language: system
        pass_filenames: true
        types_or: [ts, tsx, javascript, jsx, json, yaml, markdown, css, astro]

      - id: eslint
        name: eslint
        entry: pnpm exec eslint --fix
        language: system
        pass_filenames: true
        types_or: [ts, tsx, javascript, jsx, astro]

      - id: typecheck
        name: typecheck
        entry: pnpm run typecheck
        language: system
        pass_filenames: false
        always_run: true
