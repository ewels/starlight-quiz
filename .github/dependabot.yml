version: 2
updates:
  # npm / pnpm workspace dependencies (root, package and docs).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      # One PR for routine minor/patch bumps to keep the noise down.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions — keeps the SHA pins (and their version comments) current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - '*'
