name: Release

# Manual only. The changesets action publishes any package version that is not
# yet on npm, so running it on every push to main would attempt to publish — we
# only want that to happen when a release is explicitly requested (and once the
# NPM_TOKEN secret is configured). Trigger this from the Actions tab when ready.
on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the version PR and git tags
      pull-requests: write # open the "Version Packages" PR
      id-token: write # npm provenance via GitHub OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Changesets needs to push the version PR and tags, so credentials must persist.
          persist-credentials: true
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      # `version` updates package versions + changelogs via a PR; `publish`
      # releases to npm once that PR is merged. Provenance is enabled through
      # publishConfig.provenance and the id-token permission above.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: 'chore: release'
          title: 'chore: release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
